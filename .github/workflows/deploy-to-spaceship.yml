name: Deploy to Spaceship

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_REMOTE_PATH }}
          exclude: |
            - .git
            - .git/**
            - .github
            - .github/**
            - node_modules
            - node_modules/**
            - workflows
            - workflows/**
            - README.md
            - LICENSE
            - package.json
            - package-lock.json
            - .gitignore
            - .editorconfig
            - *.log
            - .env
            - .env.*
